<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Maxi by Torben</title>

  <meta
    name="description"
    content="Wähle dein Betriebssystem: MaxiOS oder miniOS."
  />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/boot/boot.css?v=1" />
</head>

<body>
  <main class="boot-manager" aria-labelledby="bootTitle">
    <header class="boot-header">
      <span class="boot-dot boot-dot-red"></span>
      <span class="boot-dot boot-dot-yellow"></span>
      <span class="boot-dot boot-dot-green"></span>
      <span class="boot-title">Terminal</span>
    </header>

    <section class="boot-content">
      <div class="boot-line" id="bootText" aria-live="polite"></div>

      <div class="recommended-system">
        <p class="recommended-label">Empfohlenes Betriebssystem</p>

        <a class="recommended-card" id="recommendedSystemLink" href="/maxios/">
          <span class="recommended-icon" id="recommendedSystemIcon">🖥️</span>

          <span>
            <strong id="recommendedSystemName">MaxiOS</strong>
          </span>

          <span class="recommended-arrow">Starten ↵</span>
        </a>
      </div>

      <nav class="boot-options" aria-label="Betriebssystem auswählen">
        <a class="boot-option" href="/maxios/" data-option="1">
          <span class="boot-option-number">[1]</span>

          <span>
            <strong>MaxiOS</strong>
            <span>Fensterbasierte Oberfläche für große Bildschirme.</span>
          </span>

          <span class="boot-option-arrow">↵</span>
        </a>

        <a class="boot-option" href="/minios/" data-option="2">
          <span class="boot-option-number">[2]</span>

          <span>
            <strong>miniOS</strong>
            <span>Touchbasierte Oberfläche für kleine Bildschirme.</span>
          </span>

          <span class="boot-option-arrow">↵</span>
        </a>
      </nav>

      <p class="boot-footer">
        <span class="desktop-hint">
          Tipp: Drücke 1 oder 2 auf deiner Tastatur. Enter startet die Empfehlung.
        </span>

        <span class="mobile-hint">
          Tippe auf dein System.
        </span>
      </p>
    </section>
  </main>

  <script src="/boot/boot.js?v=1" defer></script>
</body>
</html>
