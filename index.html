<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Maxi by Torben</title>

  <meta
    name="description"
    content="Maxi by Torben – ein kleines System im Internet."
  />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Maxi by Torben",
      "alternateName": "T-Maxi",
      "url": "https://t-maxi.de/"
    }
  </script>

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/boot/boot.css?v=1" />
</head>

<body>
  <main class="boot-manager" aria-labelledby="bootTitle">
    <header class="boot-header">
      <span class="boot-dot boot-dot-red" aria-hidden="true"></span>
      <span class="boot-dot boot-dot-yellow" aria-hidden="true"></span>
      <span class="boot-dot boot-dot-green" aria-hidden="true"></span>
      <span class="boot-title">Terminal</span>
    </header>

    <section class="boot-content">
      <h1 class="sr-only" id="bootTitle">
        Maxi by Torben Systemstart
      </h1>

      <div class="boot-line boot-line-compact" id="bootText" aria-live="polite"></div>

      <div class="boot-autostart" id="bootAutostart">
        <p>
          Startet automatisch...
        </p>

        <button
          class="boot-switch-button"
          id="bootSwitchButton"
          type="button"
        >
          Anderes System wählen
        </button>
      </div>

      <nav
        class="boot-options is-hidden"
        id="bootOptions"
        aria-label="Betriebssystem auswählen"
      >
        <a class="boot-option" href="/maxios/" data-option="1">
          <span class="boot-option-number" aria-hidden="true">[1]</span>

          <span>
            <strong>MaxiOS</strong>
            <span>Fensterbasierte Oberfläche für große Bildschirme.</span>
          </span>

          <span class="boot-option-arrow" aria-hidden="true">↵</span>
        </a>

        <a class="boot-option" href="/minios/" data-option="2">
          <span class="boot-option-number" aria-hidden="true">[2]</span>

          <span>
            <strong>miniOS</strong>
            <span>Touchbasierte Oberfläche für kleine Bildschirme.</span>
          </span>

          <span class="boot-option-arrow" aria-hidden="true">↵</span>
        </a>
      </nav>

      <p class="boot-footer is-hidden" id="bootFooter">
        <span class="desktop-hint">
          Tipp: Drücke 1 oder 2 auf deiner Tastatur.
        </span>

        <span class="mobile-hint">
          Tippe auf dein System.
        </span>
      </p>
    </section>
  </main>

  <script src="/boot/boot.js?v=1" defer></script>
</body>
</html>
