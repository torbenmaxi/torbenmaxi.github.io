<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>miniOS · Maxi by Torben</title>

  <meta
    name="description"
    content="miniOS – ein kleines System im Internet."
  />

  <script>
    const savedMiniOSTheme =
      localStorage.getItem("miniosTheme") || localStorage.getItem("maxiosTheme");

    if (savedMiniOSTheme === "light") {
      document.documentElement.classList.add("minios-light");
    }
  </script>

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/minios/minios.css?v=1" />
</head>

<body>
  <main class="minios" id="minios">
    <section class="minios-phone" aria-label="miniOS Oberfläche">
      <header class="minios-statusbar">
        <span id="miniosClock">--:--</span>

        <div class="minios-status-icons" aria-hidden="true">
          <span class="minios-signal">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </span>
        
          <span class="minios-status-wifi" aria-hidden="true">
            <svg viewBox="0 0 20 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M2 4.8C6.4 1.2 13.6 1.2 18 4.8"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M5 8C8 5.8 12 5.8 15 8"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M8.2 10.8C9.3 10.1 10.7 10.1 11.8 10.8"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <circle cx="10" cy="14" r="1.25" fill="currentColor" />
            </svg>
          </span>
        
          <span class="minios-battery"></span>
        </div>
      </header>

      <section class="minios-home" aria-label="Homescreen">
        <div class="minios-app-grid" aria-label="Apps">
          <button
            class="minios-app-icon"
            type="button"
            data-app="music"
            data-home-icon
            aria-label="Musik öffnen"
            style="--icon-x: 22px; --icon-y: 42px;"
          >
            <span class="minios-icon-symbol minios-icon-music" aria-hidden="true">
              <span class="minios-music-note">♪</span>
            </span>
            <span>Musik</span>
          </button>

          <button
            class="minios-app-icon"
            type="button"
            data-app="settings"
            data-home-icon
            aria-label="Einstellungen öffnen"
            style="--icon-x: 108px; --icon-y: 42px;"
          >
            <span class="minios-icon-symbol minios-icon-settings" aria-hidden="true">
              ⚙
            </span>
            <span>Einstellungen</span>
          </button>
        </div>
      </section>

      <section
        class="minios-app-screen"
        id="musicApp"
        aria-hidden="true"
        aria-labelledby="musicAppTitle"
      >
        <header class="minios-app-header">
          <h2 id="musicAppTitle">Musik</h2>
        </header>

        <div class="minios-app-content">
          <p class="minios-app-intro">
            Eine Playlist für nebenbei.
          </p>

          <iframe
            class="minios-music-frame"
            id="musicFrame"
            allow="autoplay *; encrypted-media *;"
            title="Apple Music Playlist Seventeen"
            sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
            src="https://embed.music.apple.com/de/playlist/seventeen/pl.u-8aAVXG9hmx2x65x?theme=dark"
          ></iframe>
        </div>

        <button
          class="minios-home-indicator"
          data-close-app
          type="button"
          aria-label="Zurück zum Homescreen"
        ></button>
      </section>

      <section
        class="minios-app-screen"
        id="settingsApp"
        aria-hidden="true"
        aria-labelledby="settingsAppTitle"
      >
        <header class="minios-app-header">
          <h2 id="settingsAppTitle">Einstellungen</h2>
        </header>

        <div class="minios-app-content">
          <div class="minios-settings-card">
            <div>
              <h3>Darstellung</h3>
              <p>Wähle, wie miniOS aussehen soll.</p>
            </div>

            <div class="minios-theme-options" aria-label="Darstellung auswählen">
              <button type="button" data-theme-option="light">
                Hell
              </button>

              <button type="button" data-theme-option="dark">
                Dunkel
              </button>
            </div>
          </div>
        </div>

        <button
          class="minios-home-indicator"
          data-close-app
          type="button"
          aria-label="Zurück zum Homescreen"
        ></button>
      </section>
    </section>
  </main>

  <script src="/minios/minios.js?v=1" defer></script>
</body>
</html>
