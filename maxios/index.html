<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MaxiOS · Maxi by Torben</title>

  <meta
    name="description"
    content="MaxiOS – ein kleines System im Internet."
  />

  <script>
    const savedMaxiosTheme =
      localStorage.getItem("maxiosTheme") || localStorage.getItem("theme");

    if (savedMaxiosTheme === "light") {
      document.documentElement.classList.add("maxios-light");
    }
  </script>

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/maxios/maxios.css?v=1" />
</head>

<body>
  <main class="maxios" id="maxios">
    <header class="maxios-topbar">
      <div class="maxios-topbar-left">
        <a class="maxios-brand" href="/" aria-label="Zurück zur Startseite">
          <span class="maxios-brand-dot"></span>
          <span>MaxiOS</span>
        </a>

        <span>Datei</span>

        <div class="maxios-menu">
          <button
            class="maxios-menu-button"
            id="statsMenuButton"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="statsMenu"
          >
            Statistiken
          </button>
        
          <div
            class="maxios-menu-panel maxios-stats-menu"
            id="statsMenu"
            role="menu"
            aria-hidden="true"
          >
            <div class="maxios-stats-menu-row">
              <span>Likes</span>
              <strong id="maxiosStatsLikes">–</strong>
            </div>
        
            <div class="maxios-stats-menu-row">
              <span>Aufrufe</span>
              <strong id="maxiosStatsPageViews">–</strong>
            </div>
        
            <div class="maxios-stats-menu-row">
              <span>Gerade aktiv</span>
              <strong id="maxiosStatsActiveVisitors">–</strong>
            </div>
        
            <p class="maxios-stats-menu-note" id="maxiosStatsUpdated">
              Wird geladen...
            </p>
          </div>
        </div>

        <div class="maxios-menu">
          <button
            class="maxios-menu-button"
            id="appearanceMenuButton"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="appearanceMenu"
          >
            Darstellung
          </button>

          <div
            class="maxios-menu-panel"
            id="appearanceMenu"
            role="menu"
            aria-hidden="true"
          >
            <button
              type="button"
              role="menuitemradio"
              data-theme-option="light"
              aria-pressed="false"
            >
              Hell
            </button>

            <button
              type="button"
              role="menuitemradio"
              data-theme-option="dark"
              aria-pressed="false"
            >
              Dunkel
            </button>
          </div>
        </div>

        <span>Gehe zu</span>
        <span>Hilfe</span>
      </div>

      <div class="maxios-topbar-right">
        <span id="maxiosClock">--:--:--</span>
      </div>
    </header>

    <section class="maxios-desktop" aria-label="MaxiOS Desktop">
      <div class="maxios-icons" aria-label="Apps">
        <button
          class="maxios-icon"
          type="button"
          data-app="music"
          data-desktop-icon
          aria-label="Musik öffnen"
          style="--icon-x: 28px; --icon-y: 64px;"
        >
          <span class="maxios-icon-symbol maxios-icon-music" aria-hidden="true">
            <span class="maxios-music-note">♪</span>
          </span>
          <span>Musik</span>
        </button>
      </div>
    
      <div class="maxios-window-layer" id="maxiosWindowLayer"></div>
    
      <div
        class="maxios-minimized-bar"
        id="maxiosMinimizedBar"
        aria-label="Minimierte Fenster"
      ></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/maxios/maxios.js?v=1" defer></script>
</body>
</html>
