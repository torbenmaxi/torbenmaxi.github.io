<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MaxiOS · Maxi by Torben</title>

  <meta
    name="description"
    content="MaxiOS baut sich live im Browser zusammen."
  />

  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/maxios/boot.css?v=1" />
</head>

<body>
  <main class="boot-shell" id="bootShell">
    <section class="boot-editor" aria-label="Live Code">
      <header class="boot-editor-header">
        <span class="boot-dot boot-dot-red"></span>
        <span class="boot-dot boot-dot-yellow"></span>
        <span class="boot-dot boot-dot-green"></span>
        <strong id="bootFileName">boot.maxios</strong>
      </header>

      <pre class="boot-code"><code id="bootCode"></code><span class="boot-cursor"></span></pre>
    </section>

    <section class="boot-preview" aria-label="MaxiOS Preview">
      <div class="boot-preview-header">
        <span>MaxiOS Preview</span>
        <span id="bootStatus">waiting...</span>
      </div>

      <div class="boot-preview-stage" id="bootPreview"></div>
    </section>
  </main>

  <script src="/maxios/boot.js?v=1" defer></script>
</body>
</html>
