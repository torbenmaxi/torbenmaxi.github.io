<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MaxiOS · Maxi by Torben</title>

  <meta
    name="description"
    content="MaxiOS baut sich live im Browser zusammen."
  />

  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/maxios/maxios.css?v=2" />
</head>

<body>
  <main class="maxios is-booting" id="maxios">
    <header class="maxios-topbar" id="maxiosTopbar"></header>

    <section class="maxios-desktop" aria-label="MaxiOS Desktop">
      <div class="maxios-icons" id="maxiosIcons" aria-label="Apps"></div>
      <div class="maxios-window-layer" id="maxiosWindowLayer"></div>
      <nav class="maxios-dock" id="maxiosDock" aria-label="Dock"></nav>
    </section>
  </main>

  <script src="/maxios/maxios.js?v=2" defer></script>
</body>
</html>
