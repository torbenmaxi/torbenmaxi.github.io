<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tic Tac Toe · Maxi by Torben</title>

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/style.css?v=8" />
  
  <script
    src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js"
    type="module"
  ></script>
</head>

<body>
  <header class="site-header">
    <nav class="container site-nav" aria-label="Hauptnavigation">
      <a href="/" class="logo" aria-label="Maxi by Torben Startseite">
        Maxi by Torben
      </a>

      <div class="nav-links">
        <a href="/">Start</a>
        <a href="/#projects">Projekte</a>
        <a href="/#contact">Kontakt</a>

        <dotlottie-wc
          class="theme-toggle"
          id="themeToggle"
          src="https://lottie.host/56a609b2-0d26-4762-8006-d755c1fe77e6/9BIqWC2wUn.lottie"
          stateMachineId="StateMachine1"
          aria-label="Darkmode aktivieren"
        ></dotlottie-wc>
      </div>
    </nav>
  </header>

  <main class="game-page container">
    <section class="game-intro" aria-labelledby="game-title">
      <p class="eyebrow">Projekt 01</p>

      <h1 id="game-title">Tic Tac Toe</h1>

      <p class="hero-text">
        Zwei Spieler, neun Felder, ein Gewinner.
      </p>
    </section>

    <section class="ttt-layout" aria-label="Tic Tac Toe Spiel">
      <div class="ttt-panel">
        <div class="ttt-top">
          <div>
            <p class="ttt-label">Aktueller Zug</p>
            <p class="ttt-player" id="currentPlayer">X</p>
          </div>

          <div class="ttt-controls">
            <div class="ttt-mode" aria-label="Spielmodus">
              <button
                class="ttt-mode-option active"
                type="button"
                data-mode="human"
              >
                2 Spieler
              </button>

              <button
                class="ttt-mode-option"
                type="button"
                data-mode="computer"
              >
                Computer
              </button>
            </div>

            <button class="button button-secondary" id="resetGame" type="button">
              Neustart
            </button>
          </div>
        </div>

        <div class="ttt-board" id="board" aria-label="Spielfeld">
          <button class="ttt-cell" type="button" data-index="0" aria-label="Feld 1"></button>
          <button class="ttt-cell" type="button" data-index="1" aria-label="Feld 2"></button>
          <button class="ttt-cell" type="button" data-index="2" aria-label="Feld 3"></button>
          <button class="ttt-cell" type="button" data-index="3" aria-label="Feld 4"></button>
          <button class="ttt-cell" type="button" data-index="4" aria-label="Feld 5"></button>
          <button class="ttt-cell" type="button" data-index="5" aria-label="Feld 6"></button>
          <button class="ttt-cell" type="button" data-index="6" aria-label="Feld 7"></button>
          <button class="ttt-cell" type="button" data-index="7" aria-label="Feld 8"></button>
          <button class="ttt-cell" type="button" data-index="8" aria-label="Feld 9"></button>
        </div>

        <p class="ttt-status" id="gameStatus" aria-live="polite">
          X beginnt.
        </p>
      </div>

      <aside class="ttt-score" aria-label="Spielstand">
        <p class="eyebrow">Score</p>

        <div class="score-row">
          <span>Spieler X</span>
          <strong id="scoreX">0</strong>
        </div>

        <div class="score-row">
          <span>Spieler O</span>
          <strong id="scoreO">0</strong>
        </div>

        <div class="score-row">
          <span>Unentschieden</span>
          <strong id="scoreDraw">0</strong>
        </div>

        <button class="button button-primary score-reset" id="resetScore" type="button">
          Score zurücksetzen
        </button>
      </aside>
    </section>
  </main>

  <script src="/script.js?v=8"></script>
</body>
</html>
